<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>еҚҲеӨңжҖӘи«Үйӣ»еҸ° Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Noto+Sans+TC:wght@400;700;900&family=Noto+Serif+TC:wght@400;700;900&display=swap" rel="stylesheet">
<style>
body { margin:0; background:#111; display:flex; justify-content:center; padding:20px; }

/* =====================================================
   BASE + VARIABLES
===================================================== */
#app-root *, #app-root *::before, #app-root *::after {
  box-sizing:border-box; margin:0; padding:0;
}
#app-root {
  --hr-bg:        #0a0a0e;
  --hr-bg2:       #14141a;
  --hr-crt:       #4ade80;
  --hr-crt-dim:   rgba(74,222,128,0.65);
  --hr-line:      rgba(74,222,128,0.18);
  --hr-line-soft: rgba(74,222,128,0.08);
  --hr-warn:      #dc2626;
  --hr-amber:     #fcd34d;
  --hr-paper:     #f4e8d0;
  --hr-ink:       #2a1f10;

  width:100%; height:520px; max-width:480px;
  position:relative; overflow:hidden;
  background:var(--hr-bg);
  background-image:url('../../aseets/йҗөзӣ’зҙ жқҗ.png');
  background-size:cover;
  border-radius:4px;
  box-shadow:0 10px 40px rgba(0,0,0,0.8);
  font-size:14px; color:var(--hr-crt);
  font-family:'Noto Sans TC','Microsoft JhengHei',sans-serif;
}
/* е…ЁзүҲжҺғжҸҸз·ҡ */
#app-root::after {
  content:''; position:absolute; inset:0; pointer-events:none; z-index:200;
  background:repeating-linear-gradient(
    to bottom,transparent 0px,transparent 2px,
    rgba(0,0,0,0.07) 3px,transparent 4px
  );
}
/* й ҒйқўеҲҮжҸӣ */
#app-root .hr-page {
  position:absolute; inset:0; display:none; flex-direction:column;
  animation:hrFadeIn .25s ease;
}
#app-root .hr-page.active { display:flex; }
@keyframes hrFadeIn { from{opacity:0;} to{opacity:1;} }
@keyframes hrBlink   { 0%,100%{opacity:1;} 50%{opacity:0.15;} }
@keyframes hrSpin    { to{transform:rotate(360deg);} }

/* =====================================================
   HEADER
===================================================== */
#app-root .hr-header {
  flex-shrink:0; height:48px; position:relative;
  display:flex; align-items:center; padding:0 12px; gap:8px;
  background-image:url('../../aseets/йҗөзӣ’зҙ жқҗ.png');
  background-size:cover;
  border-bottom:1px solid var(--hr-line);
  overflow:hidden;
}
#app-root .hr-header::before {
  content:''; position:absolute; inset:0;
  background:rgba(0,0,0,0.62); pointer-events:none; z-index:0;
}
#app-root .hr-header > * { position:relative; z-index:1; }
#app-root .hr-rec-dot {
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
  background:var(--hr-warn); box-shadow:0 0 8px var(--hr-warn);
  animation:hrBlink 1.4s ease-in-out infinite;
}
#app-root .hr-rec-label {
  font-family:'VT323',monospace; font-size:13px;
  color:var(--hr-warn); letter-spacing:2px;
}
#app-root .hr-header-center {
  flex:1; display:flex; flex-direction:column; align-items:center;
}
#app-root .hr-title {
  font-family:'Noto Serif TC',serif; font-size:16px; font-weight:900;
  letter-spacing:4px; color:var(--hr-amber);
  text-shadow:0 0 10px rgba(252,211,77,0.45);
}
#app-root .hr-subtitle {
  font-family:'VT323',monospace; font-size:10px;
  letter-spacing:3px; color:var(--hr-crt-dim);
}
#app-root .hr-signal-badge {
  display:flex; align-items:center; gap:5px;
}
#app-root .hr-signal-text {
  font-family:'VT323',monospace; font-size:11px;
  color:var(--hr-crt-dim); letter-spacing:1px;
}

/* =====================================================
   CRT SECTION
===================================================== */
#app-root .hr-crt-section {
  flex-shrink:0; height:182px; position:relative;
  margin:4px 10px 0;
}
#app-root .hr-crt-frame {
  position:absolute; inset:0;
  background-image:url('../../aseets/hr_crt_frame.png');
  background-size:100% 100%; background-repeat:no-repeat;
}
#app-root .hr-screen-inner {
  position:absolute;
  left:8.5%; top:9%; width:79%; height:76%;
  overflow:hidden;
}
#app-root .hr-screen-noise {
  position:absolute; inset:0; pointer-events:none;
  background-image:url('../../aseets/еҷӘй»һзҙ жқҗ.png');
  background-size:cover;
  mix-blend-mode:screen; opacity:0.18; z-index:3;
}
#app-root .hr-screen-inner::after {
  content:''; position:absolute; inset:0; pointer-events:none; z-index:4;
  background:repeating-linear-gradient(
    to bottom,transparent 0px,transparent 2px,
    rgba(0,0,0,0.1) 3px,transparent 4px
  );
}
#app-root #crt-offline {
  position:absolute; inset:0; display:flex;
  align-items:center; justify-content:center; z-index:5;
  background:rgba(0,5,2,0.75);
}
#app-root #crt-offline span {
  font-family:'VT323',monospace; font-size:30px;
  letter-spacing:8px; color:#dc2626;
  text-shadow:0 0 12px #dc2626;
  animation:hrBlink 2s ease-in-out infinite;
}
#app-root #crt-typing {
  position:absolute; inset:0; z-index:5; display:none;
  padding:8px; overflow:hidden;
  background:rgba(0,10,4,0.87);
  font-family:'VT323','Noto Sans TC',monospace;
  font-size:13px; color:#4ade80; line-height:1.65;
  text-shadow:0 0 6px rgba(74,222,128,0.6);
  white-space:pre-wrap;
}
#app-root #crt-typing::after {
  content:'в–Ҡ'; animation:hrBlink .9s steps(2) infinite; color:#4ade80;
}

/* =====================================================
   ARCHIVE HEADER
===================================================== */
#app-root .hr-archive-header {
  flex-shrink:0; height:28px; margin-top:4px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 12px;
  background:rgba(0,0,0,0.72);
  border-top:1px solid var(--hr-line);
  border-bottom:1px solid var(--hr-line);
}
#app-root .hr-archive-left {
  display:flex; align-items:center; gap:5px;
  font-size:11px; font-weight:700; letter-spacing:2px; color:var(--hr-amber);
}
#app-root .hr-archive-right {
  display:flex; align-items:center; gap:4px;
  font-size:9px; color:var(--hr-warn); letter-spacing:1px;
}

/* =====================================================
   CARDS
===================================================== */
#app-root .hr-cards-row {
  display:grid; grid-template-columns:repeat(3,1fr);
  gap:6px; padding:5px 10px;
  flex:1; min-height:0;
}
#app-root .hr-card {
  position:relative; border-radius:2px; cursor:pointer;
  background-size:100% 100%; background-repeat:no-repeat;
  transition:transform .2s, box-shadow .2s;
  overflow:hidden; display:flex; flex-direction:column;
}
#app-root #card-slot-0 { background-image:url('../../aseets/hr_card_1.png'); }
#app-root #card-slot-1 { background-image:url('../../aseets/hr_card_2.png'); }
#app-root #card-slot-2 { background-image:url('../../aseets/hr_card_3.png'); }
#app-root .hr-card:hover { transform:translateY(-2px); }
#app-root .hr-card.selected {
  box-shadow:0 0 16px rgba(220,38,38,0.8), inset 0 0 0 1px rgba(220,38,38,0.55);
}
/* photo еҚҖ */
#app-root .hr-card-photo {
  height:68px; position:relative; overflow:hidden;
  background:linear-gradient(180deg,#060606 0%,#180a0a 100%);
}
#app-root .hr-card-photo-noise {
  position:absolute; inset:0;
  background-image:url('../../aseets/еҷӘй»һзҙ жқҗ.png');
  background-size:cover; opacity:0.35; mix-blend-mode:screen;
}
#app-root .hr-card-new-badge {
  position:absolute; top:3px; right:3px; z-index:2;
}
/* ж–Үеӯ—еҚҖ */
#app-root .hr-card-body {
  flex:1; padding:3px 5px 3px;
  display:flex; flex-direction:column; gap:1px;
}
#app-root .hr-card-title {
  font-family:'Noto Serif TC',serif; font-size:9.5px; font-weight:900;
  color:var(--hr-ink); text-align:center; letter-spacing:0.5px;
  line-height:1.35;
}
#app-root .hr-card-meta {
  font-size:8px; color:rgba(42,31,16,0.7);
  text-align:center; font-family:'VT323',monospace;
}
#app-root .hr-card-danger {
  display:flex; align-items:center; justify-content:center; gap:3px;
  margin-top:2px;
}
#app-root .hr-card-danger-label {
  font-size:7px; color:rgba(42,31,16,0.6);
  font-family:'Noto Sans TC',sans-serif;
}
/* еҚұйҡӘеәҰж–№еЎҠ */
#app-root .db {
  fill:rgba(74,222,128,0.12);
  stroke:rgba(74,222,128,0.3); stroke-width:0.5;
}
#app-root .db.on { fill:#dc2626; stroke:#b91c1c; }
/* з©әж®јзӢҖж…Ӣ */
#app-root .hr-card.empty .hr-card-body { opacity:0; pointer-events:none; }
#app-root .hr-card.empty .hr-card-photo {
  background:linear-gradient(180deg,#030303 0%,#0a0404 100%);
}
#app-root .hr-card.empty .hr-card-new-badge { display:none !important; }

/* =====================================================
   FOOTER
===================================================== */
#app-root .hr-footer {
  flex-shrink:0; height:58px;
  display:grid; grid-template-columns:5fr 4fr 5fr;
  gap:6px; padding:5px 10px;
  background:rgba(0,0,0,0.55);
  border-top:1px solid var(--hr-line);
}
#app-root .hr-btn-img {
  border:none; padding:0; margin:0; cursor:pointer;
  background-size:100% 100%; background-repeat:no-repeat;
  border-radius:2px; position:relative; overflow:hidden;
  transition:filter .2s, transform .1s;
}
#app-root .hr-btn-img:hover:not(.hr-btn-warning):not(.disabled) {
  filter:brightness(1.18); transform:translateY(-1px);
}
#app-root .hr-btn-img:active:not(.hr-btn-warning):not(.disabled) {
  transform:translateY(0);
}
#app-root .hr-btn-warning {
  background-image:url('../../aseets/hr_btn_warning.png');
  cursor:default;
}
#app-root .hr-btn-refresh {
  background-image:url('../../aseets/hr_btn_refresh.png');
}
#app-root .hr-btn-enter {
  background-image:url('../../aseets/hr_btn_enter.png');
  transition:filter .2s, transform .1s, opacity .35s;
}
#app-root .hr-btn-enter.disabled {
  opacity:0.4; cursor:not-allowed; pointer-events:none;
}
#app-root .hr-btn-label {
  position:absolute; inset:0;
  display:flex; align-items:center; justify-content:center; gap:4px;
  font-family:'VT323',monospace; font-size:14px;
  font-weight:700; letter-spacing:2px;
  color:rgba(255,255,255,0.88);
  text-shadow:0 1px 4px rgba(0,0,0,0.9);
  pointer-events:none;
}

/* =====================================================
   PAGE-DREAM
===================================================== */
#app-root #page-dream {
  background:var(--hr-bg);
  background-image:url('../../aseets/йҗөзӣ’зҙ жқҗ.png');
  background-size:cover;
}
#app-root .hr-dream-header {
  flex-shrink:0; height:48px; position:relative; overflow:hidden;
  display:flex; align-items:center; gap:10px; padding:0 12px;
  background-image:url('../../aseets/йҗөзӣ’зҙ жқҗ.png');
  background-size:cover;
  border-bottom:1px solid var(--hr-line);
}
#app-root .hr-dream-header::before {
  content:''; position:absolute; inset:0;
  background:rgba(0,0,0,0.62); pointer-events:none;
}
#app-root .hr-dream-header > * { position:relative; z-index:1; }
#app-root .hr-btn-back {
  background:none; border:1px solid transparent;
  color:var(--hr-crt-dim); font-size:20px; cursor:pointer;
  padding:4px 8px; border-radius:3px; transition:.2s; line-height:1;
}
#app-root .hr-btn-back:hover {
  color:var(--hr-crt); border-color:var(--hr-line);
  background:var(--hr-line-soft);
}
#app-root .hr-dream-title-wrap {
  flex:1; display:flex; flex-direction:column;
}
#app-root .hr-dream-sub {
  font-family:'VT323',monospace; font-size:9px;
  letter-spacing:3px; color:var(--hr-crt-dim);
}
#app-root .hr-dream-h {
  font-family:'Noto Serif TC',serif; font-size:14px;
  font-weight:900; letter-spacing:3px; color:var(--hr-crt);
}
#app-root .hr-dream-body {
  flex:1; overflow-y:auto; padding:12px;
  display:flex; flex-direction:column; gap:10px;
  scrollbar-width:thin; scrollbar-color:var(--hr-line) transparent;
}
#app-root .hr-dream-body::-webkit-scrollbar { width:3px; }
#app-root .hr-dream-body::-webkit-scrollbar-thumb { background:var(--hr-line); }
#app-root .hr-detail-card {
  background:rgba(10,10,14,0.78);
  border:1px solid rgba(74,222,128,0.15);
  border-radius:2px; padding:10px 12px;
}
#app-root .hr-label {
  font-size:8px; font-weight:800; color:var(--hr-crt-dim);
  text-transform:uppercase; letter-spacing:2px;
  margin-bottom:4px; display:block;
  font-family:'VT323',monospace;
}
#app-root .hr-text { font-size:12px; color:#d4d4d8; line-height:1.7; }
#app-root .hr-text strong { color:var(--hr-amber); }
#app-root .hr-lastwords {
  font-style:italic; color:var(--hr-warn);
  text-shadow:0 0 6px rgba(220,38,38,0.35);
  font-size:13px; line-height:1.7;
}
#app-root .hr-dream-footer {
  flex-shrink:0; height:58px;
  display:grid; grid-template-columns:1fr 2fr;
  gap:8px; padding:5px 12px;
  background:rgba(0,0,0,0.6);
  border-top:1px solid var(--hr-line);
}
/* Loading */
#app-root .hr-loading {
  flex:1; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:10px;
  color:var(--hr-crt-dim); font-size:11px;
  letter-spacing:3px; font-family:'VT323',monospace;
}
#app-root .hr-spinner {
  width:24px; height:24px;
  border:2px solid var(--hr-line); border-top-color:var(--hr-crt);
  border-radius:50%; animation:hrSpin 1s linear infinite;
}
/* Toast */
#app-root #hr-toast {
  position:absolute; bottom:66px; left:50%;
  transform:translateX(-50%) translateY(12px);
  background:rgba(10,10,14,0.95); color:var(--hr-crt);
  border:1px solid var(--hr-crt);
  padding:7px 16px; border-radius:2px;
  font-size:11px; font-weight:700; letter-spacing:1.5px;
  pointer-events:none; opacity:0; transition:.3s;
  white-space:nowrap; z-index:999;
  box-shadow:0 0 12px rgba(74,222,128,0.3);
  font-family:'VT323',monospace;
}
#app-root #hr-toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
#app-root #hr-toast.danger { color:var(--hr-warn); border-color:var(--hr-warn); box-shadow:0 0 12px rgba(220,38,38,0.3); }
</style>
</head>
<body>
<div id="app-root">

<!-- ===================================================
     PAGE-MAIN
=================================================== -->
<div class="hr-page active" id="page-main">

  <!-- HEADER -->
  <div class="hr-header">
    <div class="hr-rec-dot"></div>
    <span class="hr-rec-label">REC</span>
    <div class="hr-header-center">
      <span class="hr-title">еҚҲеӨңжҖӘи«Үйӣ»еҸ°</span>
      <span class="hr-subtitle">MIDNIGHT FREQ // ON AIR</span>
    </div>
    <div class="hr-signal-badge">
      <span class="hr-signal-text">иЁҠиҷҹиүҜеҘҪ</span>
      <svg width="22" height="14" viewBox="0 0 22 14" xmlns="http://www.w3.org/2000/svg">
        <rect x="0"  y="10" width="4" height="4"  rx="0.5" fill="#4ade80" opacity="0.9"/>
        <rect x="6"  y="6"  width="4" height="8"  rx="0.5" fill="#4ade80" opacity="0.9"/>
        <rect x="12" y="2"  width="4" height="12" rx="0.5" fill="#4ade80" opacity="0.9"/>
        <rect x="18" y="0"  width="4" height="14" rx="0.5" fill="#4ade80" opacity="0.35"/>
      </svg>
    </div>
  </div>

  <!-- CRT SECTION -->
  <div class="hr-crt-section">
    <div class="hr-crt-frame"></div>
    <div class="hr-screen-inner" id="screen-inner">
      <!-- SVG иһўе№•е…§е®№ (z-index 2) -->
      <svg id="crt-svg" width="100%" height="100%" viewBox="0 0 320 138"
           xmlns="http://www.w3.org/2000/svg"
           style="position:absolute;inset:0;z-index:2;display:block;">
        <defs>
          <filter id="glow" x="-25%" y="-25%" width="150%" height="150%">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>
        <!-- й ӮйғЁжЁҷзұӨиЎҢ -->
        <text x="8" y="14" font-family="VT323,monospace" font-size="10"
              fill="rgba(74,222,128,0.7)" letter-spacing="1">й »зҺҮ FM</text>
        <text id="svg-time" x="312" y="14" font-family="VT323,monospace" font-size="10"
              fill="rgba(74,222,128,0.6)" letter-spacing="1" text-anchor="end">еҚҲеӨңжҷӮж®ө 00:00</text>
        <!-- 99.7 еӨ§еӯ— -->
        <text x="8" y="76" font-family="VT323,monospace" font-size="76"
              fill="#4ade80" filter="url(#glow)">99.7</text>
        <!-- жіўеҪўпјҡеә•йғЁе°ҚйҪҠеңЁ y=62пјҢз”ұ JS еӢ•з•« -->
        <g id="waveform" transform="translate(198,62) scale(1,-1)">
          <rect class="wb" x="0"   y="0" width="5" height="24" fill="#4ade80" opacity="0.78"/>
          <rect class="wb" x="7"   y="0" width="5" height="38" fill="#4ade80" opacity="0.78"/>
          <rect class="wb" x="14"  y="0" width="5" height="18" fill="#4ade80" opacity="0.78"/>
          <rect class="wb" x="21"  y="0" width="5" height="42" fill="#4ade80" opacity="0.78"/>
          <rect class="wb" x="28"  y="0" width="5" height="28" fill="#4ade80" opacity="0.78"/>
          <rect class="wb" x="35"  y="0" width="5" height="16" fill="#4ade80" opacity="0.78"/>
          <rect class="wb" x="42"  y="0" width="5" height="44" fill="#4ade80" opacity="0.78"/>
          <rect class="wb" x="49"  y="0" width="5" height="30" fill="#4ade80" opacity="0.78"/>
          <rect class="wb" x="56"  y="0" width="5" height="14" fill="#4ade80" opacity="0.78"/>
          <rect class="wb" x="63"  y="0" width="5" height="36" fill="#4ade80" opacity="0.78"/>
          <rect class="wb" x="70"  y="0" width="5" height="22" fill="#4ade80" opacity="0.78"/>
          <rect class="wb" x="77"  y="0" width="5" height="32" fill="#4ade80" opacity="0.78"/>
          <rect class="wb" x="84"  y="0" width="5" height="40" fill="#4ade80" opacity="0.78"/>
          <rect class="wb" x="91"  y="0" width="5" height="20" fill="#4ade80" opacity="0.78"/>
          <rect class="wb" x="98"  y="0" width="5" height="34" fill="#4ade80" opacity="0.78"/>
          <rect class="wb" x="105" y="0" width="5" height="18" fill="#4ade80" opacity="0.78"/>
        </g>
        <!-- жіўеҪўеҹәз·ҡ -->
        <line x1="198" y1="62" x2="316" y2="62"
              stroke="rgba(74,222,128,0.25)" stroke-width="0.5"/>
        <!-- й »зҺҮеҲ»еәҰе°ә -->
        <g transform="translate(8,90)">
          <line x1="0" y1="8" x2="204" y2="8" stroke="rgba(74,222,128,0.4)" stroke-width="0.8"/>
          <line x1="0"   y1="4" x2="0"   y2="12" stroke="rgba(74,222,128,0.5)" stroke-width="0.8"/>
          <line x1="40"  y1="4" x2="40"  y2="12" stroke="rgba(74,222,128,0.5)" stroke-width="0.8"/>
          <line x1="80"  y1="4" x2="80"  y2="12" stroke="rgba(74,222,128,0.5)" stroke-width="0.8"/>
          <line x1="122" y1="4" x2="122" y2="12" stroke="rgba(74,222,128,0.5)" stroke-width="0.8"/>
          <line x1="162" y1="4" x2="162" y2="12" stroke="rgba(74,222,128,0.5)" stroke-width="0.8"/>
          <line x1="204" y1="4" x2="204" y2="12" stroke="rgba(74,222,128,0.5)" stroke-width="0.8"/>
          <text x="0"   y="22" font-family="VT323,monospace" font-size="9" fill="rgba(74,222,128,0.6)" text-anchor="middle">88</text>
          <text x="40"  y="22" font-family="VT323,monospace" font-size="9" fill="rgba(74,222,128,0.6)" text-anchor="middle">92</text>

<script>
// ================================================================
//  зӢҖж…Ӣ
// ================================================================
const STATE = {
  stories:     [],
  activeStory: null,
  selectedIdx: null,
  typingTimer: null
};

// ================================================================
//  е·Ҙе…·
// ================================================================
function showPage(id) {
  document.querySelectorAll('#app-root .hr-page')
          .forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function showToast(msg, danger = false) {
  const t = document.getElementById('hr-toast');
  t.textContent = msg;
  t.classList.toggle('danger', danger);
  t.classList.add('show');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.classList.remove('show'), 2500);
}

function getPlayerName() {
  try { return (window.parent || window).VoidTerminal?.getUserName?.() || 'иҒҪзңҫ'; }
  catch(e) { return 'иҒҪзңҫ'; }
}

function tickClock() {
  const el = document.getElementById('svg-time');
  if (!el) return;
  const n = new Date();
  const hh = String(n.getHours()).padStart(2,'0');
  const mm = String(n.getMinutes()).padStart(2,'0');
  el.textContent = `еҚҲеӨңжҷӮж®ө ${hh}:${mm}`;
}

// в”Җв”Җ CRT в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function crtOffline() {
  const off = document.getElementById('crt-offline');
  const typ = document.getElementById('crt-typing');
  if (off) off.style.display = 'flex';
  if (typ) typ.style.display = 'none';
}

function crtType(text, speed, onDone) {
  speed = speed || 35;
  const typing  = document.getElementById('crt-typing');
  const offline = document.getElementById('crt-offline');
  if (STATE.typingTimer) clearTimeout(STATE.typingTimer);
  if (offline) offline.style.display = 'none';
  if (typing)  { typing.style.display = 'block'; typing.textContent = ''; }
  let i = 0;
  function tick() {
    if (i < text.length) {
      typing.textContent += text[i++];
      typing.scrollTop = typing.scrollHeight;
      STATE.typingTimer = setTimeout(tick, speed);
    } else {
      STATE.typingTimer = null;
      if (onDone) onDone();
    }
  }
  tick();
}
function crtTypePromise(text, speed) {
  return new Promise(r => crtType(text, speed, r));
}
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// в”Җв”Җ жіўеҪўеӢ•з•« в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function animateWaveform() {
  const bars = document.querySelectorAll('#waveform .wb');
  if (!bars.length) return;
  const maxH = 46, minH = 6;
  function tick() {
    bars.forEach(bar => {
      bar.setAttribute('height', Math.floor(Math.random() * (maxH - minH) + minH));
    });
  }
  tick();
  setInterval(tick, 160);
}

// в”Җв”Җ йҒёеҚЎ / йҖІе…Ҙ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function selectCard(idx) {
  if (!STATE.stories[idx]) return;
  STATE.selectedIdx = idx;
  document.querySelectorAll('.hr-card')
          .forEach((c, i) => c.classList.toggle('selected', i === idx));
  const btn = document.getElementById('btn-enter');
  if (btn) btn.classList.remove('disabled');
}

function enterSelected() {
  if (STATE.selectedIdx === null) return;
  openDream(STATE.selectedIdx);
  showPage('page-dream');
}

// в”Җв”Җ еҚұйҡӘеәҰ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function dangerLevel(source) {
  if (!source) return 3;
  const high = ['дәЎйқҲ','еҺІй¬ј','и©ӣе’’','иЎҖ','еұҚ','жӯ»','еҶӨ','з…һ'];
  const low  = ['е№»иҰә','еҝғзҗҶ','еҹ·еҝө','еӣһжҶ¶','еӨў','еҪұ'];
  if (high.some(k => source.includes(k))) return 5;
  if (low.some(k  => source.includes(k))) return 2;
  return 3;
}

function setDanger(idx, level) {
  const svg = document.getElementById('danger-' + idx);
  if (!svg) return;
  svg.querySelectorAll('.db').forEach((r, i) => {
    r.classList.toggle('on', i < level);
  });
}

// в”Җв”Җ renderStoriesпјҲжӣҙж–°дёүеҖӢеӣәе®ҡеҚЎж§Ҫпјүв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function renderStories() {
  STATE.stories.forEach(function(s, i) {
    var slot = document.getElementById('card-slot-' + i);
    if (!slot) return;
    slot.classList.remove('empty');
    var titleEl = document.getElementById('card-title-' + i);
    var metaEl  = document.getElementById('card-meta-'  + i);
    var newBadge = document.getElementById('new-' + i);
    if (titleEl) titleEl.textContent = s.title;
    if (metaEl)  metaEl.textContent  = s.gender + 'пҪң' + s.age + 'жӯІпҪң' + s.background;
    if (newBadge) newBadge.style.display = '';
    setDanger(i, dangerLevel(s.source));
  });
}

// в”Җв”Җ йҮҚзҪ®еҚЎзүҮ в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function resetCards() {
  STATE.selectedIdx = null;
  STATE.stories = [];
  [0,1,2].forEach(function(i) {
    var slot = document.getElementById('card-slot-' + i);
    if (slot) { slot.classList.add('empty'); slot.classList.remove('selected'); }
    var nb = document.getElementById('new-' + i);
    if (nb) nb.style.display = 'none';
    var t = document.getElementById('card-title-' + i);
    if (t) t.textContent = '';
    var m = document.getElementById('card-meta-' + i);
    if (m) m.textContent = '';
    setDanger(i, 0);
  });
  var enterBtn = document.getElementById('btn-enter');
  if (enterBtn) enterBtn.classList.add('disabled');
}

// ================================================================
//  PAGE-MAIN: й–Ӣе§Ӣе»Јж’ӯ
// ================================================================
async function startBroadcast() {
  var btn = document.getElementById('btn-refresh');
  if (btn) btn.style.pointerEvents = 'none';
  resetCards();

  var playerName = getPlayerName();
  await crtTypePromise('вҖҰвҖҰиЁҠиҷҹйҖЈз·ҡдёӯвҖҰвҖҰ', 60);
  await sleep(500);

async function callTavernAI(prompt) {
  try {
    var fn = window.generateRaw || (window.parent && window.parent.generateRaw);
    if (!fn) throw new Error('generateRaw дёҚеҸҜз”Ё');
    var res = await fn({
      user_input: ' ',
      ordered_prompts: [
        'world_info', 'chat_history',
        { role: 'system', content: prompt }
      ],
      quiet: true,
      stop: ['User:', '\n\n\n']
    });
    return typeof res === 'string' ? res : (res && res.message ? res.message : '');
  } catch(e) {
    console.error('[HORROR_RADIO] AI е‘јеҸ«еӨұж•—:', e);
    return null;
  }
}

function injectToTavern(txt, autoSend) {
  try {
    var TH = window.TavernHelper || (window.parent && window.parent.TavernHelper);
    if (TH && typeof TH.createChatMessages === 'function') {
      TH.createChatMessages([{ role:'user', name:'System', message:txt }], { refresh:'affected' });
      return true;
    }
    var box = window.parent && window.parent.document && window.parent.document.getElementById('send_textarea');
    if (box) {
      box.value = txt;
      box.dispatchEvent(new Event('input', { bubbles:true }));
      box.focus();
      if (autoSend) {
        setTimeout(function() {
          var btn = window.parent.document.getElementById('send_but');
          if (btn) btn.click();
        }, 200);
      }
      return true;
    }
    throw new Error('жүҫдёҚеҲ°й…’йӨЁијёе…ҘжЎҶ');
  } catch(e) {
    console.error('[HORROR_RADIO] жіЁе…ҘеӨұж•—:', e);
    showToast('вқҢ з„Ўжі•йҖЈжҺҘй…’йӨЁ', true);
    return false;
  }
}

async function writeDetailToLorebook(story, detail) {
  try {
    var helper = window.TavernHelper || (window.parent && window.parent.TavernHelper);
    if (!helper) return null;
    var bookName = null;
    if (typeof helper.getOrCreateChatWorldbook === 'function')
      bookName = await helper.getOrCreateChatWorldbook('current');
    else if (typeof helper.getOrCreateChatLorebook === 'function')
      bookName = await helper.getOrCreateChatLorebook();
    if (!bookName) return null;
    var entryName = 'е…ҘеӨўжӘ”жЎҲ-' + story.title;
    var keys = [story.title, story.id, 'е…ҘеӨў', 'е…ҘеӨўиҖ…', 'е…ҘеӨўжӘ”жЎҲ'];
    var content =
      'гҖҗеҚҲеӨңи©ӯи«ҮВ·жӯёи·Ҝйӣ»еҸ° В· е…ҘеӨўжӘ”жЎҲ В· гҖҠ' + story.title + 'гҖӢгҖ‘\n' +
      'вҡ пёҸ жӯӨжӘ”жЎҲеғ…дҫӣж•ҳдәӢ AI еҸғй–ұпјҢзҰҒжӯўеҗ‘з”ЁжҲ¶еҠҮйҖҸгҖӮ\n' +
      'в”Ғв”Ғв”Ғ дё»ж’ӯиӘӘжӣёзүҲ в”Ғв”Ғв”Ғ\n' + (story.fullTale || 'пјҲз„Ўпјү') + '\n' +
      'в”Ғв”Ғв”Ғ зөҗж§ӢеҢ–иіҮж–ҷ в”Ғв”Ғв”Ғ\n' +
      'жЁҷйЎҢпјҡгҖҠ' + story.title + 'гҖӢ\n' +
      'дё»и§’пјҡ' + story.gender + 'пјҢ' + story.age + 'жӯІпјҢ' + story.background + '\n' +
      'дәӢд»¶пјҡ' + story.event + '  жҒҗжҖ–дҫҶжәҗпјҡ' + story.source + '\n' +
      'еЈһзөҗеұҖпјҡ' + story.badEnd + '\n' +
      'йҒәиЁҖпјҡгҖҢ' + story.lastWords + 'гҖҚ\n' +
      'в”Ғв”Ғв”Ғ и©ізҙ°еҠҮжң¬ в”Ғв”Ғв”Ғ\n' + detail;
    if (typeof helper.createWorldbookEntries === 'function') {
      await helper.createWorldbookEntries(bookName, [{
        name: entryName, enabled: true,
        strategy: { type:'constant', keys: keys },
        content: content,
        comment: 'horror-radioВ·' + story.id
      }]);
      return bookName;
    }
    if (typeof helper.createLorebookEntries === 'function') {
      await helper.createLorebookEntries(bookName, [{
        comment: entryName, enabled: true, type:'constant', keys: keys, content: content
      }]);
      return bookName;
    }
    return null;
  } catch(e) {
    console.error('[HORROR_RADIO] дё–з•ҢжӣёеӨұж•—:', e);
    return null;
  }
}
